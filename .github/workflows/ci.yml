name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - consus
          - consus-core
          - consus-hdf5
          - consus-fits
          - consus-zarr
          - consus-netcdf
          - consus-parquet
          - consus-arrow
          - consus-compression
          - consus-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy (${{ matrix.package }})
        run: cargo clippy -p ${{ matrix.package }} --all-features -- -D warnings
      - name: cargo check (${{ matrix.package }}, default features)
        run: cargo check -p ${{ matrix.package }}
      - name: cargo check (${{ matrix.package }}, all features)
        run: cargo check -p ${{ matrix.package }} --all-features
      - name: cargo check (no_std core)
        if: matrix.package == 'consus-core'
        run: cargo check -p consus-core --no-default-features

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        package:
          - consus
          - consus-core
          - consus-hdf5
          - consus-fits
          - consus-zarr
          - consus-netcdf
          - consus-parquet
          - consus-arrow
          - consus-compression
          - consus-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (${{ matrix.package }})
        run: cargo test -p ${{ matrix.package }} --all-features

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - consus
          - consus-core
          - consus-hdf5
          - consus-fits
          - consus-zarr
          - consus-netcdf
          - consus-parquet
          - consus-arrow
          - consus-compression
          - consus-io
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (${{ matrix.package }})
        run: cargo check -p ${{ matrix.package }}
