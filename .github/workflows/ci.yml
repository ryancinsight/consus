name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - consus
          - consus-core
          - consus-hdf5
          - consus-fits
          - consus-zarr
          - consus-netcdf
          - consus-parquet
          - consus-arrow
          - consus-compression
          - consus-io
          - consus-mat
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy (${{ matrix.package }})
        run: cargo clippy -p ${{ matrix.package }} --all-features -- -D warnings
      - name: cargo check (${{ matrix.package }}, default features)
        run: cargo check -p ${{ matrix.package }}
      - name: cargo check (${{ matrix.package }}, all features)
        run: cargo check -p ${{ matrix.package }} --all-features
      - name: cargo check (no_std core)
        if: matrix.package == 'consus-core'
        run: cargo check -p consus-core --no-default-features

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        package:
          - consus
          - consus-core
          - consus-hdf5
          - consus-fits
          - consus-zarr
          - consus-netcdf
          - consus-parquet
          - consus-arrow
          - consus-compression
          - consus-io
          - consus-mat
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (${{ matrix.package }})
        run: cargo test -p ${{ matrix.package }} --all-features

  msrv:
    name: MSRV (1.85.0)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - consus
          - consus-core
          - consus-hdf5
          - consus-fits
          - consus-zarr
          - consus-netcdf
          - consus-parquet
          - consus-arrow
          - consus-compression
          - consus-io
          - consus-mat
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - uses: Swatinem/rust-cache@v2
      - name: cargo check (${{ matrix.package }})
        run: cargo check -p ${{ matrix.package }}

  test-mat-features:
    name: Test consus-mat feature matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test (consus-mat, default features)
        run: cargo test -p consus-mat
      - name: cargo test (consus-mat, no compress / no v73)
        run: cargo test -p consus-mat --no-default-features --features std,alloc

  # ADR-015: native moirai S3 backend (no tokio) against a real S3 server.
  # The rusoto<->moirai byte-identical differential runs in-process (mock); this
  # job additionally exercises moirai-s3 (path-style + SigV4) against live MinIO.
  s3-minio:
    name: S3 native backend (MinIO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Start MinIO
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:9000/minio/health/ready && break
            sleep 1
          done
      - name: Create bucket and upload test object
        run: |
          curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o mc
          chmod +x mc
          ./mc alias set local http://127.0.0.1:9000 minioadmin minioadmin
          ./mc mb local/consus-test
          head -c 4096 /dev/urandom > object.bin
          ./mc cp object.bin local/consus-test/object.bin
      - name: S3 differential + real-endpoint moirai read
        env:
          S3_TEST_ENDPOINT: http://127.0.0.1:9000
          S3_TEST_BUCKET: consus-test
          S3_TEST_KEY: object.bin
          S3_TEST_OBJECT_LEN: "4096"
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          AWS_REGION: us-east-1
        run: |
          cargo test -p consus-io --no-default-features --features "s3,s3-moirai" \
            --test s3_rusoto_moirai_differential -- --nocapture
